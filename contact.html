<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - JJMB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c1950 0%, #27284d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .logo { display: flex; align-items: center; }
        .logo img { height: 70px; width: auto; display: block; border-radius: 15px; }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.10;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .contact-panel {
            width: min(900px, 100%);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            color: white;
            backdrop-filter: blur(20px);
        }

        .contact-panel h1 {
            font-size: 56px;
            margin-bottom: 12px;
            animation: fadeInUp 0.8s ease;
        }

        .contact-panel p {
            font-size: 20px;
            opacity: 0.85;
            margin-bottom: 32px;
            animation: fadeInUp 1s ease 0.2s both;
        }

        .contact-list {
            display: grid;
            gap: 18px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 22px 24px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .contact-item span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
            font-size: 18px;
        }

        .contact-item div {
            display: flex;
            flex-direction: column;
        }

        .contact-item div strong {
            font-size: 16px;
            margin-bottom: 6px;
        }

        .contact-item div a,
        .contact-item div p {
            color: #d7def5;
            text-decoration: none;
            font-size: 15px;
            word-break: break-word;
        }

        .contact-item div a:hover {
            opacity: 0.8;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

                </div>
