<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - JJMB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c1950 0%, #27284d 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .logo { display: flex; align-items: center; }
        .logo img { height: 70px; width: auto; display: block; border-radius: 15px; }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.10;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Landing layout: left profile image + right welcome text */
        .landing { display: flex; align-items: center; justify-content: center; gap: 36px; color: white; }
        .profile-pic { flex: 0 0 auto; }
        .profile-pic img { width: 300px; height: 300px; object-fit: cover; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.45); display: block; }
        .welcome-text { text-align: left; }
        .welcome-text h1 { font-size: 64px; margin-bottom: 12px; animation: fadeInUp 0.8s ease; }
        .welcome-text p { font-size: 22px; opacity: 0.9; animation: fadeInUp 1s ease 0.2s both; }

        @media (max-width: 720px) {
            .landing { flex-direction: column; gap: 18px; padding: 24px; }
            .welcome-text { text-align: center; }
            .profile-pic img { width: 140px; height: 140px; }
            .welcome-text h1 { font-size: 40px; }
            .welcome-text p { font-size: 18px; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body data-page="home">
    <header>
        <div class="logo">
            <img id="site-logo" src="https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/jjmb.png" alt="Logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="landing" data-reveal>
            <div class="profile-pic" data-reveal>
                <img src="https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/jjmb.png?raw=true" alt="Profile picture">
            </div>
            <div class="welcome-text">
                <h1>Welcome to my Website Portfolio!</h1>
                <p>Explore my work and get in touch with me.</p>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
