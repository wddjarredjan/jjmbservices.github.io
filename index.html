<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta property="og:image" content="https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/jjmb.png?raw=true">
    <meta property="og:image:alt" content="JJMB portfolio logo">
    <meta property="og:site_name" content="JJMB Portfolio">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Home - JJMB">
    <meta name="twitter:description" content="Explore JJMB's portfolio featuring web development projects, design skills, and contact information.">
    <meta name="twitter:image" content="https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/jjmb.png?raw=true">
    <title>Home - JJMB</title>
    <link rel="icon" href="https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/jjmb.png?raw=true" type="image/png">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "url": "https://jjmbservices.github.io/index.html",
      "name": "Home - JJMB",
      "description": "JJMB portfolio website showcasing web design, project work, and contact details for web development and digital support."
    }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/background-image-index.png?raw=true');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .logo { display: flex; align-items: center; }
        .logo img { height: 70px; width: auto; display: block; border-radius: 15px; }

        nav {
            display: flex;
            gap: 40px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: opacity 0.3s ease;
        }

        nav a:hover {
            opacity: 0.10;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Landing layout: left profile image + right welcome text */
        .landing { display: flex; align-items: center; justify-content: center; gap: 36px; color: white; }
        .profile-pic { flex: 0 0 auto; }
        .profile-pic img { width: 300px; height: 300px; object-fit: cover; border-radius: 50%; box-shadow: 0 10px 30px rgba(0,0,0,0.45); display: block; }
        .welcome-text { text-align: left; }
        .welcome-text h1 { font-size: 64px; margin-bottom: 12px; animation: fadeInUp 0.8s ease; }
        .welcome-text p { font-size: 22px; opacity: 0.9; animation: fadeInUp 1s ease 0.2s both; }

        @media (max-width: 720px) {
            .landing { flex-direction: column; gap: 18px; padding: 24px; }
            .welcome-text { text-align: center; }
            .profile-pic img { width: 140px; height: 140px; }
            .welcome-text h1 { font-size: 40px; }
            .welcome-text p { font-size: 18px; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body data-page="home">
    <header>
        <div class="logo">
            <img id="site-logo" src="https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/jjmb.png?raw=true" alt="Logo">
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main>
        <div class="landing" data-reveal>
            <div class="profile-pic" data-reveal>
                <img src="https://github.com/wddjarredjan/jjmbservices.github.io/blob/main/mainpicture.jpg?raw=true" alt="Profile picture">
            </div>
            <div class="welcome-text">
                <h1>Welcome to my</h1>
                <h1>Website Portfolio!</h1>
                <p>Explore my work and get in touch with me.</p>
            </div>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
